<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoDolphin Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-page">
        <div class="container">
            <img src="dodolphin-night.jpg" class="bg-photo">
            
            <div class="btn-on-door pulse" onclick="showMenu()">ورود به منو</div>

            <div class="social-box">
                <a href="https://instagram.com/DoDolphincafe" class="social-item">📸 اینستاگرام</a>
                <a href="https://wa.me/989303030526" class="social-item">💬 واتس‌اپ</a>
                <a href="#" class="social-item">📍 لوکیشن</a>
            </div>
        </div>
    </div>

    <div id="menu-page" style="display:none;">
        <header class="menu-header">
            <div class="menu-top">
                <span onclick="location.reload()" style="cursor:pointer">❮ بازگشت</span>
                <h2 style="color:#d4af37; margin:0;">منوی دودلفین</h2>
                <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
            </div>
        </header>

        <main class="menu-content">
            <div class="product-item">
                <div class="p-info">
                    <h3>اسپرسو دبل</h3>
                    <p>۱۰۰٪ عربیکا، طعمی قوی</p>
                    <span class="p-price">۶۵,۰۰۰ تومان</span>
                </div>
                <button class="add-btn" onclick="add()">+</button>
            </div>

            <div class="product-item">
                <div class="p-info">
                    <h3>کیک شکلاتی مخصوص</h3>
                    <p>تازه و خانگی</p>
                    <span class="p-price">۸۵,۰۰۰ تومان</span>
                </div>
                <button class="add-btn" onclick="add()">+</button>
            </div>
        </main>

        <div id="checkout-bar" class="checkout-footer" style="display:none;">
            <button class="pay-btn">ثبت سفارش در واتس‌اپ</button>
        </div>
    </div>

    <script>
        // تابع جابجایی بین دو صفحه
        function showMenu() {
            document.getElementById('splash-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
        }

        // تابع ساده برای سبد خرید
        let count = 0;
        function add() {
            count++;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('checkout-bar').style.display = 'block';
        }
    </script>
</body>
</html>
